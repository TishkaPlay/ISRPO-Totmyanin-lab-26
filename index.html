<!doctype html>
<html lang="ru-RU">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Лабораторная работа №26. Современный JavaScript</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div class="container">
			<h1>Лабораторная работа №26. Современный JavaScript</h1>
			<h2>Современный JavaScript</h2>
			<div class="task-form">
				<h3>Добавить новую задачу</h3>
				<input type="text" id="taskInput" placeholder="Введите задачу..." />
				<button id="addTask">Добавить</button>
			</div>
			<div class="filters">
				<button class="filter-btn" data-filter="all">Все</button>
				<button class="filter-btn" data-filter="active">Активные</button>
				<button class="filter-btn active" data-filter="completed">Завершённые</button>
			</div>
			<div id="taskList" class="task-list"></div>
			<div class="status">
				<p>Всего задач: <span id="totalTasks">0</span></p>
				<p>Выполнено: <span id="completedTasks">0</span></p>
			</div>
		</div>
		<script type="module" src="js/app.js"></script>
	</body>
</html>
