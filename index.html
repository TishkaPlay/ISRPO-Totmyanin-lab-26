<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Менеджер задач</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>📝 Менеджер задач</h1>
        <h2>Организуй свой день</h2>

        <div class="task-form">
            <input type="text" id="taskInput" placeholder="Введите новую задачу..." autocomplete="off">
            <button type="button" id="addTask">Добавить</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="active">Активные</button>
            <button class="filter-btn" data-filter="completed">Выполненные</button>
        </div>

        <div id="taskList" class="task-list"></div>

        <div class="stats">
            <p>Всего: <span class="stats-total" id="totalTasks">0</span></p>
            <p>Выполнено: <span class="stats-completed" id="completedTasks">0</span></p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
